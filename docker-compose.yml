services:
  postgres:
    image: postgres:16-alpine
    container_name: website-template-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-website_template}
      POSTGRES_USER: ${POSTGRES_USER:-strapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strapi}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-strapi} -d ${POSTGRES_DB:-website_template}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
